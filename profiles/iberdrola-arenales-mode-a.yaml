# Iberdrola Arenales — Mode A: BSEC Simulator (48h stress test)
#
# 50 simulated Wingman devices sending BSEC telemetry at 3s intervals.
# Payload matches real field device output (SerialNumber 00000000002C pattern).
# Runs for 48 hours continuously.
#
# Connection: MQTT/WebSocket/TLS to gw-lora-0001...:443/mqtt
# Auth: Anonymous (ClientID only)
# Topic: gw-lora-0001/bme680/data

name: "iberdrola-arenales-mode-a"

transport:
  mode: "mosquitto_via_nginx"

  mosquitto:
    mqtt_host: "gw-lora-0001.iberdrola-arenales-26.sentinels.pro"
    mqtt_port: 443
    mqtt_use_tls: true
    mqtt_websocket_path: "/mqtt"
    mqtt_protocol: "websockets"
    client_id: "gw-simulator-stress-001"
    mqtt_username: ""
    mqtt_password: ""
    mosquitto_topic: "gw-lora-0001/bme680/data"

  tb_direct:
    tb_host: "aiot.sentinels.pro"
    tb_port: 443
    tb_use_tls: true
    tb_token: ""
    tb_topic: "v1/gateway/telemetry"

gateway:
  name: "gw-iot-direct-ingest"
  type: "default"

devices:
  count: 50
  prefix: "BME680_SN_"
  serial_prefix: "0000000000"
  models:
    - name: "Nordic"
      weight: 0.8
      perfil: "ULP"
    - name: "ESP32"
      weight: 0.2
      perfil: "standard"

telemetry:
  interval_seconds: 3
  keys:
    - temperature
    - pressure
    - humidity
    - gas_resistance
    - gas_index
    - battery_voltage
  ranges:
    temperature:
      min: 28.0
      max: 45.0
      drift: 0.15
    pressure:
      min: 970.0
      max: 985.0
      drift: 0.02
    humidity:
      min: 15.0
      max: 35.0
      drift: 0.25
    gas_resistance:
      min: 50000.0
      max: 15000000.0
      drift: 0.0
    gas_index:
      min: 0
      max: 500
      drift: 0
    battery_voltage:
      min: 3.5
      max: 4.2
      drift: 0.002

schedule:
  mode: "duration"
  duration_minutes: 2880   # 48 hours
